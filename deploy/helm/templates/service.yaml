apiVersion: v1
kind: Service
metadata:
  name: {{ include "servicebeard.fullname" . }}-api
  labels:
    {{- include "servicebeard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "servicebeard.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "servicebeard.fullname" . }}-web
  labels:
    {{- include "servicebeard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.web.port }}
      targetPort: {{ .Values.web.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "servicebeard.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
