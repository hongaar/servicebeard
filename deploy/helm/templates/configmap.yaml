apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "servicebeard.fullname" . }}-config
  labels:
    {{- include "servicebeard.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.env.NODE_ENV | quote }}
  LOG_LEVEL: {{ .Values.env.LOG_LEVEL | quote }}
  PORT: {{ .Values.api.port | quote }}
  OIDC_LOGIN: {{ .Values.env.OIDC_LOGIN | quote }}
  OIDC_SIGNUP: {{ .Values.env.OIDC_SIGNUP | quote }}
  OIDC_PROVIDER_NAME: {{ .Values.env.OIDC_PROVIDER_NAME | quote }}
  GITHUB_LOGIN: {{ .Values.env.GITHUB_LOGIN | quote }}
  GITHUB_SIGNUP: {{ .Values.env.GITHUB_SIGNUP | quote }}
  GITLAB_LOGIN: {{ .Values.env.GITLAB_LOGIN | quote }}
  GITLAB_SIGNUP: {{ .Values.env.GITLAB_SIGNUP | quote }}
  LINEAR_LOGIN: {{ .Values.env.LINEAR_LOGIN | quote }}
  LINEAR_SIGNUP: {{ .Values.env.LINEAR_SIGNUP | quote }}
  LOCAL_LOGIN: {{ .Values.env.LOCAL_LOGIN | quote }}
  LOCAL_LOGIN_SIGNUP: {{ .Values.env.LOCAL_LOGIN_SIGNUP | quote }}
  OIDC_ISSUER: {{ .Values.env.OIDC_ISSUER | quote }}
  OIDC_CLIENT_ID: {{ .Values.env.OIDC_CLIENT_ID | quote }}
  GITHUB_CLIENT_ID: {{ .Values.env.GITHUB_CLIENT_ID | quote }}
  GITHUB_APP_ID: {{ .Values.env.GITHUB_APP_ID | quote }}
  GITLAB_BASE_URL: {{ .Values.env.GITLAB_BASE_URL | quote }}
  GITLAB_CLIENT_ID: {{ .Values.env.GITLAB_CLIENT_ID | quote }}
  LINEAR_CLIENT_ID: {{ .Values.env.LINEAR_CLIENT_ID | quote }}
  API_URL: {{ .Values.env.API_URL | quote }}
  WEB_URL: {{ .Values.env.WEB_URL | quote }}
  WEBHOOK_BASE_URL: {{ .Values.env.WEBHOOK_BASE_URL | quote }}
  IMAP_POLL_INTERVAL_SECONDS: {{ .Values.env.IMAP_POLL_INTERVAL_SECONDS | quote }}
  COMMENT_POLL_INTERVAL_SECONDS: {{ .Values.env.COMMENT_POLL_INTERVAL_SECONDS | quote }}
  SEND_EMAIL_CONCURRENCY: {{ .Values.env.SEND_EMAIL_CONCURRENCY | quote }}
  IMAP_POLL_CONCURRENCY: {{ .Values.env.IMAP_POLL_CONCURRENCY | quote }}
  COMMENT_POLL_CONCURRENCY: {{ .Values.env.COMMENT_POLL_CONCURRENCY | quote }}
  SMTP_MAX_CONNECTIONS: {{ .Values.env.SMTP_MAX_CONNECTIONS | quote }}
  SMTP_MAX_MESSAGES: {{ .Values.env.SMTP_MAX_MESSAGES | quote }}
  SMTP_IDLE_TTL_MS: {{ .Values.env.SMTP_IDLE_TTL_MS | quote }}
  SMTP_MAX_POOLS: {{ .Values.env.SMTP_MAX_POOLS | quote }}
  {{- if .Values.extension.enabled }}
  SB_EXTENSION_MANIFEST: {{ .Values.extension.manifest | quote }}
  {{- end }}
  {{- range $key, $value := .Values.extension.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
