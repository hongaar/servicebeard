name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Avoid flaky Docker Hub pulls on GitHub-hosted runners.
  CI_POSTGRES_IMAGE: public.ecr.aws/docker/library/postgres:16-alpine

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ${{ env.CI_POSTGRES_IMAGE }}
        env:
          POSTGRES_USER: servicebeard
          POSTGRES_PASSWORD: servicebeard
          POSTGRES_DB: servicebeard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Smoke test (database)
        env:
          DATABASE_URL: postgres://servicebeard:servicebeard@localhost:5432/servicebeard
          ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
        run: |
          set -euo pipefail
          bun run db:migrate
          bun run db:generate
          git diff --exit-code packages/db/drizzle

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        env:
          DATABASE_URL: postgres://servicebeard:servicebeard@localhost:5432/servicebeard
          ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
        run: bun run test:unit

      - name: Build web
        run: bun run --filter @servicebeard/web build

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint-typecheck-test]
    services:
      postgres:
        image: ${{ env.CI_POSTGRES_IMAGE }}
        env:
          POSTGRES_USER: servicebeard
          POSTGRES_PASSWORD: servicebeard
          POSTGRES_DB: servicebeard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://servicebeard:servicebeard@localhost:5432/servicebeard
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      SESSION_SECRET: e2e-session-secret
      LOCAL_LOGIN: "true"
      LOCAL_LOGIN_SIGNUP: "true"
      GITHUB_LOGIN: "false"
      GITLAB_LOGIN: "false"
      OIDC_LOGIN: "false"
      API_URL: http://localhost:3000
      WEB_URL: http://127.0.0.1:5173
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        id: setup-bun
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Migrate database
        run: bun run db:migrate

      - name: Seed integration test data
        run: bun run test:integration:seed

      - name: Start stack
        run: bun tests/e2e/fixtures/stack.ts start

      - name: Wait for stack
        run: bun tests/e2e/fixtures/stack.ts wait

      - name: Integration — security tests
        run: bun run test:integration:security

      - name: Integration — security report
        if: ${{ always() && !cancelled() && steps.setup-bun.conclusion == 'success' }}
        run: bun run test:integration:security:report

      - name: Integration — UI tests
        run: bun run test:integration:ui

      - name: Stop stack
        if: ${{ always() && !cancelled() && steps.setup-bun.conclusion == 'success' }}
        run: bun tests/e2e/fixtures/stack.ts stop

      - name: Upload integration logs
        if: failure() && steps.setup-bun.conclusion == 'success'
        uses: actions/upload-artifact@v6
        with:
          name: integration-logs
          path: reports/integration/
          retention-days: 14

      - name: Upload security report
        if: ${{ always() && !cancelled() && steps.setup-bun.conclusion == 'success' }}
        uses: actions/upload-artifact@v6
        with:
          name: security-test-report
          path: reports/security/
          retention-days: 14

      - name: Upload Playwright report
        if: ${{ always() && !cancelled() && steps.setup-bun.conclusion == 'success' }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: reports/playwright/
          retention-days: 14

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: azure/setup-helm@v5

      - name: Helm lint
        run: helm lint deploy/helm

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-typecheck-test]
    strategy:
      fail-fast: true
      matrix:
        target: [api, worker, web]
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          build-contexts: |
            extension=./extensions-stub
          push: false
          tags: servicebeard-${{ matrix.target }}:build
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          outputs: ${{ github.event_name == 'push' && 'type=docker,dest=/tmp/image.tar' || '' }}

      - name: Upload image
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v6
        with:
          name: servicebeard-${{ matrix.target }}
          path: /tmp/image.tar
          retention-days: 1

  docker-push:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: servicebeard-*
          path: /tmp/images

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          for target in api worker web; do
            docker load -i "/tmp/images/servicebeard-${target}/image.tar"
          done
          for target in api worker web; do
            image="${REGISTRY}/servicebeard-${target}"
            docker tag "servicebeard-${target}:build" "${image}:${SHA}"
            docker push "${image}:${SHA}"
          done
          for target in api worker web; do
            image="${REGISTRY}/servicebeard-${target}"
            docker tag "servicebeard-${target}:build" "${image}:latest"
            docker push "${image}:latest"
          done

  helm-publish:
    runs-on: ubuntu-latest
    needs: [helm-lint, docker-push]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: azure/setup-helm@v5

      - name: Package chart
        run: |
          helm dependency update deploy/helm
          helm package deploy/helm \
            --destination /tmp/chart \
            --app-version "${GITHUB_SHA::7}"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push chart
        run: helm push /tmp/chart/*.tgz oci://ghcr.io/${{ github.repository_owner }}
