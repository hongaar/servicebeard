name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: servicebeard
          POSTGRES_PASSWORD: servicebeard
          POSTGRES_DB: servicebeard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        env:
          DATABASE_URL: postgres://servicebeard:servicebeard@localhost:5432/servicebeard
          ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
        run: bun test

      - name: Build web
        run: bun run --filter @servicebeard/web build

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint deploy/helm

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-typecheck-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/servicebeard-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/servicebeard-api:${{ github.sha }}

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: worker
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/servicebeard-worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/servicebeard-worker:${{ github.sha }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/servicebeard-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/servicebeard-web:${{ github.sha }}
