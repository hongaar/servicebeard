name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: servicebeard
          POSTGRES_PASSWORD: servicebeard
          POSTGRES_DB: servicebeard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        env:
          DATABASE_URL: postgres://servicebeard:servicebeard@localhost:5432/servicebeard
          ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
        run: bun test

      - name: Build web
        run: bun run --filter @servicebeard/web build

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint deploy/helm

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-typecheck-test]
    strategy:
      fail-fast: true
      matrix:
        target: [api, worker, web]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: false
          tags: servicebeard-${{ matrix.target }}:build
          outputs: ${{ github.event_name == 'push' && 'type=docker,dest=/tmp/image.tar' || '' }}

      - name: Upload image
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: servicebeard-${{ matrix.target }}
          path: /tmp/image.tar
          retention-days: 1

  docker-push:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: servicebeard-*
          path: /tmp/images

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          for target in api worker web; do
            docker load -i "/tmp/images/servicebeard-${target}/image.tar"
          done
          for target in api worker web; do
            image="${REGISTRY}/servicebeard-${target}"
            docker tag "servicebeard-${target}:build" "${image}:${SHA}"
            docker push "${image}:${SHA}"
          done
          for target in api worker web; do
            image="${REGISTRY}/servicebeard-${target}"
            docker tag "servicebeard-${target}:build" "${image}:latest"
            docker push "${image}:latest"
          done
