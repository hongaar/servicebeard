name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: serviceboard
          POSTGRES_PASSWORD: serviceboard
          POSTGRES_DB: serviceboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        env:
          DATABASE_URL: postgres://serviceboard:serviceboard@localhost:5432/serviceboard
          ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
        run: bun test

      - name: Build web
        run: bun run --filter @serviceboard/web build

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint deploy/helm

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-typecheck-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build --target api -t serviceboard-api .

      - name: Build Worker image
        run: docker build --target worker -t serviceboard-worker .

      - name: Build Web image
        run: docker build --target web -t serviceboard-web .
